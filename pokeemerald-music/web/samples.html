<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pokémon Emerald — instrument samples A/B</title>
<style>
  :root {
    --bg: #10141a; --panel: #1a2129; --line: #2a333f;
    --text: #d7e0ea; --dim: #6b7a8c; --blue: #6db3f2; --gold: #e0b45c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 system-ui, sans-serif;
    display: flex; justify-content: center; min-height: 100vh;
  }
  main { width: min(680px, 94vw); padding: 2.2rem 0 3rem; }
  h1 { font-size: 1.25rem; margin: 0 0 .2rem; letter-spacing: .02em; }
  p.sub { color: var(--dim); margin: 0 0 1.4rem; font-size: .85rem; }
  p.sub a { color: var(--blue); text-decoration: none; }
  #pairs { border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
  .song {
    display: flex; align-items: center; gap: .8rem;
    padding: .5rem .9rem; background: var(--panel);
    border-bottom: 1px solid var(--line);
  }
  .song:last-child { border-bottom: none; }
  .title { flex: 1; font-family: ui-monospace, monospace; font-size: .85rem; }
  .badge {
    min-width: 2.6rem; text-align: center; font-size: .72rem;
    border-radius: 999px; padding: .1rem .5rem;
  }
  .badge.gba { background: #24435f; color: var(--blue); }
  .badge.sf2 { background: #4d3d1e; color: var(--gold); }
  .btns { display: flex; gap: .4rem; align-items: center; }
  .none { color: var(--dim); font-size: .75rem; }
  button {
    background: none; border: 1px solid var(--line); color: var(--text);
    border-radius: 6px; padding: .25rem .7rem; cursor: pointer;
    font: inherit; font-size: .8rem;
  }
  button:hover { border-color: var(--dim); }
  #status { margin-left: .8rem; color: #e2777a; font-size: .8rem; }
  #count { color: var(--dim); font-size: .78rem; margin-top: 1rem; display: block; }
</style>
</head>
<body>
<main>
  <h1>Instrument samples — GBA vs soundfont</h1>
  <p class="sub">every DirectSound sample the soundtrack uses, played as one note
  through the same m4a engine. The <b>last</b> button you click per sample is saved
  on the server as your preferred version (<code>api/picks</code> holds the list).
  <a href="index.html">← back to the songs</a></p>
  <div id="pairs"></div>
  <span id="status"></span>
  <span id="count"></span>
</main>
<script src="samples.js"></script>
</body>
</html>
